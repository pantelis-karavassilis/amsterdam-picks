<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pantelis' · Amsterdam</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --ink: #1c1c1a;
      --muted: #999990;
      --rule: #ddddd8;
      --card: #efeeea;
      --hover: #e6e4de;
      --accent: #1c1c1a;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 72px;
    }

    header {
      width: 100%;
      max-width: 380px;
      margin-bottom: 48px;
      animation: fadeUp 0.5s ease both;
    }

    .name {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .location {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    hr {
      width: 100%;
      max-width: 380px;
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 36px;
      animation: fadeUp 0.5s 0.05s ease both;
    }

    .list {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--card);
      border-radius: 3px;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.15s ease;
    }

    .item:hover {
      background: var(--hover);
    }

    .item:hover .arrow {
      transform: translateX(3px);
    }

    .item-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .item-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      width: 16px;
      flex-shrink: 0;
    }

    .item-name {
      font-size: 0.88rem;
      font-weight: 400;
    }

    .arrow {
      font-size: 0.8rem;
      color: var(--muted);
      transition: transform 0.15s ease;
    }

    footer {
      margin-top: 56px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--rule);
      letter-spacing: 0.06em;
      animation: fadeUp 0.5s 0.4s ease both;
    }

    .item:nth-child(1) { animation: fadeUp 0.5s 0.10s ease both; }
    .item:nth-child(2) { animation: fadeUp 0.5s 0.16s ease both; }
    .item:nth-child(3) { animation: fadeUp 0.5s 0.22s ease both; }
    .item:nth-child(4) { animation: fadeUp 0.5s 0.28s ease both; }
    .item:nth-child(5) { animation: fadeUp 0.5s 0.34s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="name">Pantelis'</div>
    <div class="location">Amsterdam picks</div>
  </header>

  <hr />

  <div class="list">

    <a class="item" href="https://maps.app.goo.gl/d5ga7BApVqh7NQ21A?g_st=ac" target="_blank" rel="noopener">
      <div class="item-left">
        <span class="item-num">01</span>
        <span class="item-name">Night</span>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="item" href="https://maps.app.goo.gl/cL586pppnBKGsw5AA?g_st=ac" target="_blank" rel="noopener">
      <div class="item-left">
        <span class="item-num">02</span>
        <span class="item-name">Bakeries</span>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="item" href="https://maps.app.goo.gl/V49Qpmkrta8DChXy5?g_st=ac" target="_blank" rel="noopener">
      <div class="item-left">
        <span class="item-num">03</span>
        <span class="item-name">Restaurants</span>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="item" href="https://maps.app.goo.gl/r1H85JEpUUdacFJY8?g_st=ac" target="_blank" rel="noopener">
      <div class="item-left">
        <span class="item-num">04</span>
        <span class="item-name">Cafes</span>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="item" href="https://maps.app.goo.gl/j6tVX9hJuWmofNnK7?g_st=ac" target="_blank" rel="noopener">
      <div class="item-left">
        <span class="item-num">05</span>
        <span class="item-name">Wine</span>
      </div>
      <span class="arrow">→</span>
    </a>

  </div>



</body>
</html>
